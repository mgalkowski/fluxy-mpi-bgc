name: Python Application MPI BGC

on:
  push:
    branches: [ "main-mpi-bgc" ]
  pull_request:
    branches: [ "main-mpi-bgc" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest jupyter nbconvert netCDF4 scipy
        pip install -e .
   
    - name: Run tests with pytest
      run: |
        pytest